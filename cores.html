<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>libretro buildbot core status</title>
    <style>
      body { font-family: sans-serif; margin: 20px; }
      table { border-collapse: collapse; }
      th, td { padding: 4px 8px; vertical-align: middle; border-bottom: 1px solid #eee; }
      th { position: sticky; top: 0; background: white; text-align: left; }
      td:first-child { font-family: monospace; }
      img { vertical-align: middle; }
      .y { color: #2a2; text-align: center; }
      .n { color: #c66; text-align: center; }
      .u { color: #ccc; text-align: center; }
      .refresh-btn { cursor: pointer; background: none; border: none; color: #999; padding: 0 2px; font-size: 14px; }
      .refresh-btn:hover { color: #333; }
      #refresh-all { cursor: pointer; }
      #status { margin-bottom: 10px; color: #666; }
      #filter { margin-bottom: 10px; padding: 4px; width: 300px; }
    </style>
  </head>
  <body>
    <h1>libretro buildbot core status</h1>
    <div id="status">Loading...</div>
    <div id="tokenbox" style="margin-bottom:10px;">
      <input type="password" id="token" placeholder="GitLab token (stored locally)" style="width:300px;padding:4px;" />
      <button onclick="saveToken()">Save token</button>
      <span id="tokenstatus" style="color:#666;"></span>
    </div>
    <input type="text" id="filter" placeholder="Filter cores..." />
    <label><input type="checkbox" id="hideOk" onchange="saveAndApplyFilters()"> Hide all-OK rows</label>
    <label><input type="checkbox" id="hideUnknown" onchange="saveAndApplyFilters()"> Hide unknown pipelines</label>
    <button id="refresh-all" onclick="refreshAll()" title="Refresh all cores">↻ Refresh All</button>
    <table>
      <thead>
        <tr>
          <th>Core</th>
          <th>Pipeline</th>
          <th>win-x64</th>
          <th>linux-x64</th>
          <th>osx-x64</th>
          <th>osx-arm64</th>
          <th>ios-arm64</th>
          <th>tvos-arm64</th>
          <th>android-arm64-v8a</th>
        </tr>
      </thead>
      <tbody id="cores"></tbody>
    </table>

    <script>
      const GITLAB_URL = 'https://git.libretro.com';
      const GROUP = 'libretro';
      const PAGE_SIZE = 50;
      const PLATFORMS = ['windows-x64', 'linux-x64', 'osx-x64', 'osx-arm64', 'ios-arm64', 'tvos-arm64', 'android-arm64'];
      const PLATFORMS_REQUIRED = PLATFORMS.filter(p => p !== 'android-arm64');

      // Projects to skip (superseded or deprecated)
      const SKIP_PROJECTS = ['flycast', 'uae4arm-libretro'];

      // GitLab token (stored locally, never committed). Authenticated requests
      // get a much higher rate-limit ceiling, avoiding 429s from the request burst.
      function getToken() { return localStorage.getItem('cores_token') || ''; }
      function saveToken() {
        localStorage.setItem('cores_token', document.getElementById('token').value.trim());
        document.getElementById('tokenstatus').textContent = 'saved — reloading…';
        location.reload();
      }

      // Single GraphQL POST. One query returns project + latest pipeline status +
      // real job names for a whole page of projects, replacing the hundreds of
      // per-project REST calls (CI-file fetch, include resolution, pipeline lookup,
      // badge image) the old version made.
      async function gql(query, variables) {
        const token = getToken();
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['PRIVATE-TOKEN'] = token;
        const response = await fetch(`${GITLAB_URL}/api/graphql`, {
          method: 'POST',
          headers,
          body: JSON.stringify({ query, variables }),
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const json = await response.json();
        if (json.errors) throw new Error(json.errors.map(e => e.message).join('; '));
        return json.data;
      }

      // Platform patterns to look for in job names
      const PLATFORM_JOB_PATTERNS = {
        'windows-x64': ['libretro-build-windows-x64', 'build-retroarch-windows-x64', 'windows-x64'],
        'linux-x64': ['libretro-build-linux-x64', 'build-retroarch-linux-x64', 'linux-x64'],
        'android-arm64': ['android-arm64-v8a', 'android-arm64', 'build-retroarch-android-aarch64'],
        'osx-x64': ['libretro-build-osx-x64', 'build-retroarch-osx-x64', 'build-retroarch-osx-universal-metal', 'build-retroarch-osx-opengl-x64', 'osx-x64'],
        'osx-arm64': ['libretro-build-osx-arm64', 'build-retroarch-osx-arm64', 'build-retroarch-osx-universal-metal', 'osx-arm64'],
        'ios-arm64': ['libretro-build-ios-arm64', 'build-retroarch-ios-arm64', 'ios-arm64'],
        'tvos-arm64': ['libretro-build-tvos-arm64', 'build-retroarch-tvos-arm64', 'tvos-arm64'],
      };

      // GraphQL fields fetched per project. We fetch several recent pipelines
      // (with their ref) plus the default branch name, then pick the latest
      // pipeline that actually ran on the default branch — otherwise a stray
      // dependabot/MR/feature-branch pipeline would masquerade as the core's
      // status. Job names come from that pipeline, so platform availability
      // reflects what actually built on the default branch (no need to fetch
      // and parse .gitlab-ci.yml or resolve its includes).
      const PROJECT_FIELDS = `
        name
        fullPath
        webUrl
        repository { rootRef }
        pipelines(first: 20) {
          nodes { status ref jobs(first: 150) { nodes { name } } }
        }`;

      const STATUS_LABELS = {
        success: 'passed', failed: 'failed', running: 'running', pending: 'pending',
        canceled: 'canceled', created: 'created', skipped: 'skipped', manual: 'manual',
      };

      // Flatten a GraphQL project node into the shape the UI uses.
      function normalizeProject(node) {
        // Prefer the latest pipeline on the default branch; fall back to the
        // most recent pipeline if none of the fetched ones ran on it.
        const defaultBranch = node.repository ? node.repository.rootRef : null;
        const nodes = node.pipelines.nodes;
        const pipeline = (defaultBranch && nodes.find(p => p.ref === defaultBranch))
          || nodes[0] || null;
        const jobs = pipeline
          ? pipeline.jobs.nodes.map(j => j.name.toLowerCase()).filter(j => !j.includes('dummy'))
          : [];
        const platforms = {};
        for (const platform of PLATFORMS) {
          const patterns = PLATFORM_JOB_PATTERNS[platform] || [];
          platforms[platform] = jobs.some(job => patterns.some(p => job.includes(p.toLowerCase())));
        }
        return {
          name: node.name,
          slug: node.fullPath.split('/').pop().toLowerCase(),
          fullPath: node.fullPath,
          webUrl: node.webUrl,
          status: pipeline && pipeline.status ? pipeline.status.toLowerCase() : null,
          platforms,
        };
      }

      function updateRowCells(row, project) {
        const status = project.status;
        const isUnknown = !status || status === 'skipped' || status === 'manual';
        const isPassed = status === 'success';
        let allAvailable = true;
        for (let i = 0; i < PLATFORMS.length; i++) {
          const available = project.platforms[PLATFORMS[i]] || false;
          if (!available && PLATFORMS_REQUIRED.includes(PLATFORMS[i])) allAvailable = false;
          const cell = row._platformCells[i];
          cell.textContent = available ? '✓' : (isUnknown ? '—' : '✗');
          cell.className = available ? 'y' : (isUnknown ? 'u' : 'n');
        }

        // Pipeline status as a colored text link (replaces the badge image).
        const link = row._statusCell.firstChild;
        link.href = `${project.webUrl}/-/pipelines`;
        link.textContent = STATUS_LABELS[status] || status || 'none';
        link.className = isPassed ? 'y' : (isUnknown ? 'u' : 'n');

        row._project = project;
        row.dataset.ok = (isPassed && allAvailable) ? 'true' : 'false';
        row.dataset.unknown = isUnknown ? 'true' : 'false';
        applyFilters();
      }

      function refreshAll() {
        document.getElementById('cores').innerHTML = '';
        loadAll();
      }

      async function refreshProject(row) {
        for (const cell of row._platformCells) { cell.textContent = '…'; cell.className = 'u'; }
        try {
          const data = await gql(
            `query($path: ID!) { project(fullPath: $path) { ${PROJECT_FIELDS} } }`,
            { path: row._project.fullPath });
          if (data.project) updateRowCells(row, normalizeProject(data.project));
        } catch (e) {
          // leave existing cells as-is
        }
      }

      function appendProjects(projects) {
        const table = document.getElementById('cores');

        for (const project of projects) {
          if (SKIP_PROJECTS.includes(project.name.toLowerCase()) || SKIP_PROJECTS.includes(project.slug)) continue;

          const row = document.createElement('tr');
          row.dataset.name = project.name.toLowerCase();

          // Name cell
          const nameCell = document.createElement('td');
          nameCell.textContent = project.name;
          const refreshBtn = document.createElement('button');
          refreshBtn.className = 'refresh-btn';
          refreshBtn.textContent = ' ↻';
          refreshBtn.title = 'Refresh this core';
          refreshBtn.onclick = () => refreshProject(row);
          nameCell.appendChild(refreshBtn);
          row.appendChild(nameCell);

          // Pipeline status cell (link text filled in by updateRowCells)
          const statusCell = document.createElement('td');
          const link = document.createElement('a');
          link.target = '_blank';
          link.style.textDecoration = 'none';
          statusCell.appendChild(link);
          row.appendChild(statusCell);

          // Platform availability cells
          const platformCells = [];
          for (const platform of PLATFORMS) {
            const cell = document.createElement('td');
            row.appendChild(cell);
            platformCells.push(cell);
          }

          row._platformCells = platformCells;
          row._statusCell = statusCell;
          table.appendChild(row);

          updateRowCells(row, project);
        }
      }

      function saveAndApplyFilters() {
        localStorage.setItem('cores_hideOk', document.getElementById('hideOk').checked);
        localStorage.setItem('cores_hideUnknown', document.getElementById('hideUnknown').checked);
        applyFilters();
      }

      function applyFilters() {
        const query = document.getElementById('filter').value.toLowerCase();
        const hideOk = document.getElementById('hideOk').checked;
        const hideUnknown = document.getElementById('hideUnknown').checked;
        const rows = document.querySelectorAll('#cores tr');
        for (const row of rows) {
          const matchesQuery = row.dataset.name.includes(query);
          const isOk = row.dataset.ok === 'true';
          const isUnknown = row.dataset.unknown === 'true';
          const hidden = (hideOk && isOk) || (hideUnknown && isUnknown);
          row.style.display = (matchesQuery && !hidden) ? '' : 'none';
        }
      }

      function setupFilter() {
        const savedHideOk = localStorage.getItem('cores_hideOk');
        const savedHideUnknown = localStorage.getItem('cores_hideUnknown');
        document.getElementById('hideOk').checked = savedHideOk === 'true';
        document.getElementById('hideUnknown').checked = savedHideUnknown !== null ? savedHideUnknown === 'true' : true;
        document.getElementById('filter').addEventListener('input', applyFilters);
        document.getElementById('token').value = getToken();
        document.getElementById('tokenstatus').textContent =
          getToken() ? '' : 'no token — anonymous requests get rate-limited (429)';
      }

      // Walk the group's projects via cursor pagination, one GraphQL query per
      // page of PAGE_SIZE projects. Rows render incrementally as each page lands.
      async function loadAll() {
        const status = document.getElementById('status');
        const query = `query($cursor: String) {
          group(fullPath: "${GROUP}") {
            projects(first: ${PAGE_SIZE}, sort: PATH_ASC, after: $cursor) {
              pageInfo { hasNextPage endCursor }
              nodes { ${PROJECT_FIELDS} }
            }
          }
        }`;

        let cursor = null;
        let loaded = 0;
        try {
          while (true) {
            const data = await gql(query, { cursor });
            const conn = data.group.projects;
            appendProjects(conn.nodes.map(normalizeProject));
            loaded += conn.nodes.length;
            status.textContent = `Loading... (${loaded})`;
            if (!conn.pageInfo.hasNextPage) break;
            cursor = conn.pageInfo.endCursor;
          }
          status.textContent = `${loaded} projects`;
        } catch (err) {
          status.textContent = `Error: ${err.message} (${loaded} loaded)`;
          console.error(err);
        }
      }

      function main() {
        setupFilter();
        loadAll();
      }

      main();
    </script>
  </body>
</html>
